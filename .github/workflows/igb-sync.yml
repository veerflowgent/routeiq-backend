name: IGB Data Sync

on:
  schedule:
    - cron: '0 15 10 * *'   # 10th of each month at 9am CT
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run IGB scraper
        run: python scripts/igb_scraper.py

      - name: Verify output
        run: |
          python -c "
          import json, sys
          d = json.load(open('data/igb_data.json'))
          cities = len(d.get('cities', {}))
          month  = d.get('data_month', 'unknown')
          print(f'OK: {cities} cities for {month}')
          if cities < 5:
              print('ERROR: too few cities')
              sys.exit(1)
          "

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/igb_data.json
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "chore: IGB data sync $(date +'%Y-%m')"
            git push
          )
